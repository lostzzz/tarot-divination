// 保存记录到本地存储
// 保存记录
function saveRecord(nickname, topic, cardName, orientation, wish) {
    const record = {
        nickname,
        topic,
        cardName,
        orientation,
        wish,
        time: new Date().toLocaleString('zh-CN'),
        timestamp: firebase.database.ServerValue.TIMESTAMP
    };
    
    // 保存到 Firebase
    database.ref('records').push(record).then(() => {
        console.log('已保存到云端');
    }).catch(err => {
        console.error('保存失败:', err);
    });
    
    // 同时保存到 localStorage（备用）
    const records = JSON.parse(localStorage.getItem('tarot_records') || '[]');
    records.unshift(record);
    localStorage.setItem('tarot_records', JSON.stringify(records));
});
